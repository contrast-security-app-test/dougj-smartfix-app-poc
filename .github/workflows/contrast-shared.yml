name: Contrast Security Smart Workflow POC

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write
  #issues: write
  #actions: read

jobs:
  aws-login:
    name: Configure AWS Credentials
    runs-on: ubuntu-latest
    steps:
    - name: Configure AWS Credentials
      id: aws-credentials
      uses: aws-actions/configure-aws-credentials@v5
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ vars.AWS_REGION }}
        #output-credentials: true

  identify-app:
    name: Resolve Contrast Application
    runs-on: ubuntu-latest
    outputs:
      app_id: ${{ steps.resolve.outputs.app_id }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_PAT }}" | \
            docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Pull module-identifier image
        run: docker pull contrast/module-identifier:v1

      - name: Resolve CONTRAST_APP_ID
        id: resolve
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            -v "$(dirname $GITHUB_ENV):$(dirname $GITHUB_ENV)" \
            -e GITHUB_ENV="$GITHUB_ENV" \
            -e CONTRAST_HOST_NAME="${{ vars.CONTRAST_GITHUB_APP_HOST_URL }}" \
            -e CONTRAST_API_KEY="${{ secrets.CONTRAST_GITHUB_APP_API_KEY }}" \
            -e CONTRAST_AUTH_TOKEN="${{ secrets.CONTRAST_GITHUB_APP_AUTH_HEADER }}" \
            -e CONTRAST_ORG_ID="${{ vars.CONTRAST_GITHUB_APP_ORG_ID }}" \
            contrast/module-identifier:v1 \
            /repo --single --debug

          if grep -q '^CONTRAST_APP_ID=' "$GITHUB_ENV" 2>/dev/null; then
            app_id=$(grep '^CONTRAST_APP_ID=' "$GITHUB_ENV" | cut -d= -f2-)
            echo "app_id=$app_id" >> "$GITHUB_OUTPUT"
            echo "Resolved CONTRAST_APP_ID: $app_id"
          fi

      - name: Fail fast if no CONTRAST_APP_ID
        if: ${{ steps.resolve.outputs.app_id == '' }}
        run: |
          echo "::error::Module identifier could not resolve a Contrast application for this repository."
          exit 1

  call-contrast-orchestrator:
    name: Call Contrast Smart Orchestrator
    needs: identify-app
    uses: contrast-security-app-test/dougj-smartfix-app-poc/.github/workflows/contrast-orchestrator.yml@main
    with:
      contrast_host: ${{ vars.CONTRAST_GITHUB_APP_HOST_URL }}
      contrast_org_id: ${{ vars.CONTRAST_GITHUB_APP_ORG_ID }}
      contrast_app_id: ${{ needs.identify-app.outputs.app_id }}
      base_branch: ${{ github.event.repository.default_branch }}
      build_command: 'echo "No build command specified."'
      formatting_command: ''
      use_contrast_llm: 'false'
      max_open_prs: '5'
      agent_model: ''
      azure_api_base: ''
      azure_api_version: ''
      enable_full_telemetry: 'true'
      debug_mode: 'false'
      # SCA orchestration inputs
      github_app_installation_id: ${{ vars.CONTRAST_GITHUB_APP_INSTALLATION_ID }}
      repo_url: ${{ github.server_url }}
      repo_name: ${{ github.repository }}
      # AWS credentials inputs
      aws_region: ${{ vars.AWS_REGION }}
      github_runner: 'ubuntu-latest'
    secrets:
      CONTRAST_API_KEY: ${{ secrets.CONTRAST_GITHUB_APP_API_KEY }}
      CONTRAST_AUTHORIZATION_KEY: ${{ secrets.CONTRAST_GITHUB_APP_AUTH_HEADER }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
      AWS_BEARER_TOKEN_BEDROCK: ${{ secrets.AWS_BEARER_TOKEN_BEDROCK }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
